<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 828" font-family="Pretendard, 'Malgun Gothic', system-ui, sans-serif">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#555"/></marker>
    <marker id="arrd" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#999"/></marker>
  </defs>

  <!-- solid arrows (main spine, x=310) -->
  <g stroke="#555" stroke-width="1.6" marker-end="url(#arr)" fill="none">
    <line x1="310" y1="76" x2="310" y2="95"/>
    <line x1="310" y1="148" x2="310" y2="167"/>
    <line x1="310" y1="232" x2="310" y2="251"/>
    <line x1="310" y1="300" x2="310" y2="319"/>
    <line x1="310" y1="372" x2="310" y2="391"/>
    <line x1="310" y1="444" x2="310" y2="463"/>
    <line x1="310" y1="516" x2="310" y2="535"/>
    <line x1="310" y1="588" x2="310" y2="607"/>
    <line x1="310" y1="660" x2="310" y2="679"/>
    <line x1="310" y1="732" x2="310" y2="751"/>
    <line x1="460" y1="284" x2="500" y2="342"/>
  </g>

  <!-- dotted arrows -->
  <path d="M600,372 L600,706 L463,706" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrd)"/>
  <path d="M160,634 C112,675 112,735 157,778" fill="none" stroke="#999" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrd)"/>
  <text x="610" y="410" font-size="10" fill="#7a4d05">MP·이행</text>
  <text x="610" y="424" font-size="10" fill="#7a4d05">(3층 직접)</text>
  <text x="118" y="700" font-size="10" fill="#43286b" transform="rotate(-90 118 700)" text-anchor="middle">요네다(𝒰)</text>

  <!-- A : 1층 -->
  <rect x="160" y="20" width="300" height="56" rx="10" fill="#E8F4FA" stroke="#1E3A5F" stroke-width="1.5"/>
  <text x="310" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#1E3A5F">1층 · 분류</text>
  <text x="310" y="62" text-anchor="middle" font-size="11" fill="#1E3A5F">event_type · action_type · 역할쌍</text>

  <!-- P : bridge -->
  <rect x="160" y="96" width="300" height="52" rx="10" fill="#F4F4F5" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="310" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#374151">projection · 1↔2층 다리</text>
  <text x="310" y="135" text-anchor="middle" font-size="11" fill="#374151">project(타입 × 액션 × 역할쌍)</text>

  <!-- S : 2층 시작 -->
  <rect x="160" y="168" width="300" height="64" rx="10" fill="#FDF3E0" stroke="#C9821F" stroke-width="1.5"/>
  <text x="310" y="188" text-anchor="middle" font-size="13" font-weight="700" fill="#7a4d05">2층 시작 · signal</text>
  <text x="310" y="205" text-anchor="middle" font-size="11" fill="#7a4d05">대분류 CS·EM·AR·MP</text>
  <text x="310" y="221" text-anchor="middle" font-size="11" fill="#7a4d05">+ 소분류(부조·대여·유대)</text>

  <!-- F : fold -->
  <rect x="160" y="252" width="300" height="48" rx="10" fill="#FDF3E0" stroke="#C9821F" stroke-width="1.5"/>
  <text x="310" y="272" text-anchor="middle" font-size="13" font-weight="700" fill="#7a4d05">2층 · fold</text>
  <text x="310" y="289" text-anchor="middle" font-size="11" fill="#7a4d05">부호 합산 · 순서무관</text>

  <!-- M -->
  <rect x="160" y="320" width="300" height="52" rx="10" fill="#FDF3E0" stroke="#C9821F" stroke-width="1.5"/>
  <text x="310" y="342" text-anchor="middle" font-size="12" font-weight="700" fill="#7a4d05">signal 종류별 행렬</text>
  <text x="310" y="359" text-anchor="middle" font-size="11" fill="#7a4d05">EM·CS 엣지원장</text>

  <!-- N (right) -->
  <rect x="500" y="320" width="200" height="52" rx="10" fill="#FDF3E0" stroke="#C9821F" stroke-width="1.5"/>
  <text x="600" y="342" text-anchor="middle" font-size="12" font-weight="700" fill="#7a4d05">MP·이행 = 노드</text>
  <text x="600" y="359" text-anchor="middle" font-size="11" fill="#7a4d05">(행렬 아님)</text>

  <!-- NM -->
  <rect x="160" y="392" width="300" height="52" rx="10" fill="#EAF6EC" stroke="#2E7D4F" stroke-width="1.5"/>
  <text x="310" y="414" text-anchor="middle" font-size="13" font-weight="700" fill="#1d5233">3층 정규화</text>
  <text x="310" y="431" text-anchor="middle" font-size="11" fill="#1d5233">(음수 클램프 → 0~1)</text>

  <!-- MM -->
  <rect x="160" y="464" width="300" height="52" rx="10" fill="#EAF6EC" stroke="#2E7D4F" stroke-width="1.5"/>
  <text x="310" y="486" text-anchor="middle" font-size="12" font-weight="700" fill="#1d5233">행렬곱 (power iteration)</text>
  <text x="310" y="503" text-anchor="middle" font-size="11" fill="#1d5233">항등 · 결합법칙 → 범주</text>

  <!-- C -->
  <rect x="160" y="536" width="300" height="52" rx="10" fill="#EAF6EC" stroke="#2E7D4F" stroke-width="1.5"/>
  <text x="310" y="558" text-anchor="middle" font-size="12" font-weight="700" fill="#1d5233">signal별 카테고리</text>
  <text x="310" y="575" text-anchor="middle" font-size="11" fill="#1d5233">예: [EM, 부조]</text>

  <!-- U -->
  <rect x="160" y="608" width="300" height="52" rx="10" fill="#F3ECFA" stroke="#6B3FA0" stroke-width="1.5"/>
  <text x="310" y="630" text-anchor="middle" font-size="13" font-weight="700" fill="#43286b">4층 통합 신뢰네트워크</text>
  <text x="310" y="647" text-anchor="middle" font-size="11" fill="#43286b">(EM·CS 그래프·전파)</text>

  <!-- W -->
  <rect x="160" y="680" width="300" height="52" rx="10" fill="#F3ECFA" stroke="#6B3FA0" stroke-width="1.5"/>
  <text x="310" y="702" text-anchor="middle" font-size="12" font-weight="700" fill="#43286b">가중합</text>
  <text x="310" y="719" text-anchor="middle" font-size="11" fill="#43286b">네트워크 점수 + 이행</text>

  <!-- MC -->
  <rect x="160" y="752" width="300" height="56" rx="10" fill="#F3ECFA" stroke="#6B3FA0" stroke-width="2"/>
  <text x="310" y="776" text-anchor="middle" font-size="14" font-weight="700" fill="#43286b">Moi Credit</text>
  <text x="310" y="794" text-anchor="middle" font-size="11" fill="#43286b">(절대적인 노드값)</text>
</svg>
