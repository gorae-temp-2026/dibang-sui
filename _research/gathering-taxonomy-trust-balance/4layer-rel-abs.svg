<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 332" font-family="Pretendard, 'Malgun Gothic', system-ui, sans-serif">
  <defs>
    <marker id="arr2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 z" fill="#555"/></marker>
  </defs>

  <g stroke="#555" stroke-width="1.6" marker-end="url(#arr2)" fill="none">
    <line x1="260" y1="100" x2="260" y2="129"/>
    <line x1="260" y1="194" x2="260" y2="223"/>
  </g>

  <!-- EM : 상대 (l2 orange) -->
  <rect x="60" y="20" width="400" height="80" rx="10" fill="#FDF3E0" stroke="#C9821F" stroke-width="1.5"/>
  <text x="260" y="44" text-anchor="middle" font-size="13" font-weight="700" fill="#7a4d05">2층 · 신뢰잔액 (상대적인 값)</text>
  <text x="260" y="64" text-anchor="middle" font-size="11" fill="#7a4d05">노드쌍 1:1 · EM 잔액</text>
  <text x="260" y="82" text-anchor="middle" font-size="11" fill="#7a4d05">예: 태원→유상 +10만</text>

  <!-- PHI (l3 green) -->
  <rect x="60" y="130" width="400" height="64" rx="10" fill="#EAF6EC" stroke="#2E7D4F" stroke-width="1.5"/>
  <text x="260" y="156" text-anchor="middle" font-size="13" font-weight="700" fill="#1d5233">Φ : 정규화 + 행렬곱 + 고유벡터</text>
  <text x="260" y="176" text-anchor="middle" font-size="11" fill="#1d5233">(EigenTrust / reversed-giving PageRank)</text>

  <!-- CR : 절대 (l4 purple) -->
  <rect x="60" y="224" width="400" height="86" rx="10" fill="#F3ECFA" stroke="#6B3FA0" stroke-width="2"/>
  <text x="260" y="250" text-anchor="middle" font-size="13" font-weight="700" fill="#43286b">3·4층 · 신용 = Moi Credit (절대적인 값)</text>
  <text x="260" y="270" text-anchor="middle" font-size="11" fill="#43286b">노드 1개의 단일 점수</text>
  <text x="260" y="288" text-anchor="middle" font-size="11" fill="#43286b">= 네트워크 위치 (잔액 크기 아님)</text>
</svg>
