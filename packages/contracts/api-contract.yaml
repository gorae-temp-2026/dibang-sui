        - $ref: '#/components/parameters/AdminResourceId'
        - $ref: '#/components/parameters/HostSlot'
      security: [{ BearerAuth: [] }]
      responses:
        '204': { description: Cleared }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      operationId: adminMoveWeddingHostSlot
      tags: [Admin]
      summary: "[admin] 웨딩 호스트 슬롯 이동 (host_<from>_id → 빈 host_<to>_id, 수락 초대도 함께 이동)"
      description: "지정 슬롯(slot=출발)의 host_*_id를 비어 있는 대상 슬롯(to_slot)으로 옮기고, 같은 슬롯의 수락(accepted)된 초대의 slot도 함께 변경한다. 대상 슬롯이 차 있으면 409, 출발 슬롯이 비었거나 웨딩이 없으면 404, 같은 슬롯이거나 잘못된 슬롯이면 400."
      parameters:
        - $ref: '#/components/parameters/AdminResourceId'
        - $ref: '#/components/parameters/HostSlot'
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MoveHostSlotRequest' }
      responses:
        '204': { description: Moved }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /admin/weddings/{id}/host-invites:
    post:
      operationId: adminCreateHostInvite
      tags: [Admin]
      summary: "[admin] 호스트 초대 발급 (빈 슬롯에 초대 토큰 생성)"
      description: "지정 슬롯의 호스트 초대를 발급하고 token을 반환한다(링크는 {dibang}/invite/{token}). 같은 슬롯에 pending 초대가 있으면 그 token을 재사용한다. admin write 중 유일하게 본문(token)을 반환한다."
      parameters: [{ $ref: '#/components/parameters/AdminResourceId' }]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateHostInviteRequest' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HostInvite' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/wedding-lounges/{id}:
    patch:
      operationId: adminUpdateLounge
      tags: [Admin]
      summary: "[admin] 웨딩 라운지 이름 수정 (삭제는 정책상 미제공)"
      parameters: [{ $ref: '#/components/parameters/AdminResourceId' }]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAdminLoungeRequest' }
      responses:
        '204': { description: Updated }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/memory-book-photos/{id}:
    delete:
      operationId: adminDeleteMemoryBookPhoto
      tags: [Admin]
      summary: "[admin] 메모리북 큐레이션 사진 삭제"
      parameters: [{ $ref: '#/components/parameters/AdminResourceId' }]
      security: [{ BearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/shared-photos/{id}:
    delete:
      operationId: adminDeleteSharedPhoto
      tags: [Admin]
      summary: "[admin] 공유사진 삭제 (메모리북 큐레이션 cascade)"
      parameters: [{ $ref: '#/components/parameters/AdminResourceId' }]
      security: [{ BearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /admin/lounge-check-ins/{id}:
    delete:
      operationId: adminDeleteLoungeCheckIn
      tags: [Admin]
      summary: "[admin] 라운지 입장 기록 삭제"
      parameters: [{ $ref: '#/components/parameters/AdminResourceId' }]
      security: [{ BearerAuth: [] }]
      responses:
        '204': { description: Deleted }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

# ════════════════════════════════════════
# Components
# ════════════════════════════════════════
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ──────────────────────────────────────
  # Parameters
  # ──────────────────────────────────────
  parameters:
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AdminResourceId:
      name: id
      in: path
      required: true
      description: admin write 대상 리소스의 UUID
      schema:
        type: string
        format: uuid

    HostSlot:
      name: slot
      in: path
      required: true
      description: 호스트 6슬롯 키 (host_<slot>_id 컬럼과 1:1 대응)
      schema:
        type: string
        enum: [groom, bride, groom_father, groom_mother, bride_father, bride_mother]

    WeddingId:
      name: weddingId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    LoungeId:
      name: loungeId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PlaceId:
      name: placeId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ItemId:
      name: itemId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    MoiId:
      name: moiId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    AnnouncementId:
      name: announcementId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    IumId:
      name: iumId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    CommentId:
      name: commentId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    InvitationId:
      name: invitationId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    InviteToken:
      name: token
      in: path
      required: true
      schema:
        type: string

    InviteId:
      name: inviteId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Slug:
      name: slug
      in: path
      required: true
      schema:
        type: string

    GiftId:
      name: giftId
      in: path
      required: true
      schema:
        type: string
        format: uuid

    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: 페이지네이션 커서 (첫 요청 시 생략)

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
      description: 페이지 당 항목 수

    AdminPage:
      name: page
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
      description: 1부터 시작하는 페이지 번호

    AdminLimit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
      description: 페이지 당 항목 수 (admin 전용, 더 큰 한도)

    AdminSearch:
      name: search
      in: query
      required: false
      schema:
        type: string
      description: 이름·이메일·전화번호 부분 일치 (2자 이상 권장)

    AdminActivityTypeParam:
      name: type
      in: query
      required: false
      schema:
        type: string
        enum: [all, guestbook, cash_gifts, messages, shared_photos, memories, memory_book, lounge]
        default: all
      description: 게스트 활동 유형 필터

  # ──────────────────────────────────────
  # Responses (공통 에러)
  # ──────────────────────────────────────
  responses:
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemDetail'

  # ──────────────────────────────────────
  # Schemas
  # ──────────────────────────────────────
  schemas:
    # ── Admin write 요청 (핵심 필드만, 모두 optional = 부분 수정) ──
    UpdateAdminCashGiftRequest:
      type: object
      properties:
        guest_name: { type: string, maxLength: 20 }
        amount: { type: integer, minimum: 0 }
        recipient_slot: { type: string, enum: [groom, bride, groom_father, groom_mother, bride_father, bride_mother] }
        relation_category: { type: string }
        relation_detail: { type: string, maxLength: 40 }
        pay_method: { type: string, enum: [transfer, kakaopay, toss, cash] }
    UpdateAdminRsvpRequest:
      type: object
      properties:
        guest_name: { type: string, maxLength: 20 }
        attendance: { type: string, enum: [attending, absent] }
        companion_count: { type: integer, minimum: 0, maximum: 20 }
        meal: { type: string, enum: [yes, no, undecided] }
        recipient_slot: { type: string, enum: [groom, bride, groom_father, groom_mother, bride_father, bride_mother] }
        phone_last4: { type: string }
    UpdateAdminHostInviteRequest:
      type: object
      properties:
        status: { type: string, enum: [pending, accepted, cancelled] }
    UpdateAdminMemoryRequest:
      type: object
      properties:
        text: { type: string, minLength: 1, maxLength: 80 }
    UpdateAdminGuestbookMessageRequest:
      type: object
      properties:
        message: { type: string, minLength: 1, maxLength: 70 }
    UpdateAdminGuestbookEntryRequest:
      type: object
      properties:
        guest_name: { type: string, maxLength: 20 }
        recipient_slot: { type: string, enum: [groom, bride, groom_father, groom_mother, bride_father, bride_mother] }
        relation_category: { type: string }
        relation_detail: { type: string, maxLength: 40 }
    UpdateAdminMobileInvitationRequest:
      type: object
      properties:
        custom_message: { type: string }
        design_template_id: { type: string }
        slug: { type: string }
        cover_image: { type: string }
    UpdateAdminUserRequest:
      type: object
      properties:
        name: { type: string }
        phone: { type: string }
        email: { type: string, format: email }
        profile_image_url: { type: string }
    UpdateAdminLoungeRequest:
      type: object
      properties:
        name: { type: string }
    UpdateAdminWeddingRequest:
      type: object
      properties:
        groom_name: { type: string }
        bride_name: { type: string }
        date: { type: string, format: date }
        time: { type: string }
        venue_name: { type: string }
        venue_address: { type: string }
        venue_hall: { type: string }
        status: { type: string, enum: [active, deleted] }

    # ── 공통 ──
    ProblemDetail:
      type: object
      description: RFC 7807 Problem Details
      required: [type, title, status]
      properties:
        type:
          type: string
          default: about:blank
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string

    # ── Value Objects ──
    Venue:
      type: object
      required: [venue_name, venue_address]
      properties:
        venue_name:
          type: string
        venue_address:
          type: string
        venue_hall:
          type: string

    Account:
      type: object
      properties:
        bank:
          type: string
        address:
          type: string

    Position:
      type: object
      required: [x, y]
      properties:
        x:
          type: number
        y:
          type: number

    # ── Users ──
    User:
      type: object
      required: [id, name, email, created_at, consents_required, marketing_agreed]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        profile_image_url:
          type: string
        created_at:
          type: string
          format: date-time
        consents_required:
          type: array
          description: "필수 약관 중 미동의 terms_type 배열. 빈 배열이면 onboarding 게이트 통과. 클라이언트는 비어있지 않으면 /onboarding/consent로 인터셉트"
          items:
            type: string
            enum: [age_verification, service, privacy, marketing]
        marketing_agreed:
          type: boolean
          description: "마케팅 정보 수신 동의 최신 상태. /settings 마케팅 토글 초기값. consent_records의 marketing terms_type 최신 row 기준"

    ConsentItem:
      type: object
      required: [terms_type, agreed]
      properties:
        terms_type:
          type: string
          enum: [age_verification, service, privacy, marketing]
        agreed:
          type: boolean

    CreateConsentsRequest:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ConsentItem'

    UpdateMarketingConsentRequest:
      type: object
      required: [agreed]
      properties:
        agreed:
          type: boolean

    UserPublic:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          description: "사용자 이름. 마스킹 규칙 적용 (기본 마스킹, Host 또는 Ium 관계 시 실명)"
        profile_image_url:
          type: string

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        profile_image_url:
          type: string

    # ── Weddings ──
    WeddingStatus:
      type: string
      enum: [active, completed, cancelled]

    HostSlots:
      type: object
      properties:
        host_groom_id:
          type: string
          format: uuid
        host_bride_id:
          type: string
          format: uuid
        host_groom_father_id:
          type: string
          format: uuid
        host_groom_mother_id:
          type: string
          format: uuid
        host_bride_father_id:
          type: string
          format: uuid
        host_bride_mother_id:
          type: string
          format: uuid

    WeddingInfo:
      type: object
      required: [groom_name, bride_name, date, time, venue]
      properties:
        groom_name:
          type: string
        bride_name:
          type: string
        groom_father_name:
          type: string
        groom_mother_name:
          type: string
        bride_father_name:
          type: string
        bride_mother_name:
          type: string
        groom_father_deceased:
          type: boolean
          default: false
        groom_mother_deceased:
          type: boolean
          default: false
        bride_father_deceased:
          type: boolean
          default: false
        bride_mother_deceased:
          type: boolean
          default: false
        date:
          type: string
          format: date
        time:
          type: string
        venue:
          $ref: '#/components/schemas/Venue'
        groom_account:
          $ref: '#/components/schemas/Account'
        bride_account:
          $ref: '#/components/schemas/Account'
        groom_father_account:
          $ref: '#/components/schemas/Account'
        groom_mother_account:
          $ref: '#/components/schemas/Account'
        bride_father_account:
          $ref: '#/components/schemas/Account'
        bride_mother_account:
          $ref: '#/components/schemas/Account'

    Wedding:
      type: object
      required: [id, status, info, hosts, lounge, invitations, created_at]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/WeddingStatus'
        info:
          $ref: '#/components/schemas/WeddingInfo'
        hosts:
          $ref: '#/components/schemas/HostSlots'
        lounge:
          $ref: '#/components/schemas/LoungeSummary'
        invitations:
          type: array
          items:
            $ref: '#/components/schemas/InvitationSummary'
        created_at:
          type: string
          format: date-time
        sui_wedding_id:
          type: string
          nullable: true
          description: 온체인 Wedding 오브젝트 ID (dual-write, 미발행 시 null).
        sui_vault_id:
          type: string
          nullable: true
          description: 온체인 축의 Vault 오브젝트 ID (미발행 시 null).

    UpdateSuiIdsRequest:
      type: object
      properties:
        sui_wedding_id:
          type: string
          nullable: true
        sui_lounge_id:
          type: string
          nullable: true
        sui_vault_id:
          type: string
          nullable: true

    WeddingSummary:
      type: object
      required: [id, status, groom_name, bride_name, date, invitations]
      properties:
        id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/WeddingStatus'
        groom_name:
          type: string
        bride_name:
          type: string
        groom_father_name:
          type: string
        groom_mother_name:
          type: string
        bride_father_name:
          type: string
        bride_mother_name:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
        venue_name:
          type: string
        venue_hall:
          type: string
        invitations:
          type: array
          items:
            $ref: '#/components/schemas/InvitationSummary'
        lounge_id:
          type: string
          format: uuid
          description: |
            현재 사용자가 호스트인 웨딩의 라운지 id. 카드에서 '라운지 진입' 시 추가 fetch 없이
            직접 navigate하기 위해 listMyWeddings 응답에 포함. lounge가 없으면 omit.
        my_role:
          type: string
          description: "현재 사용자의 역할 (groom/bride/groom_father/groom_mother/bride_father/bride_mother). 서버가 host 슬롯 매칭으로 계산."

    ParticipatedWedding:
      type: object
      required: [id, groom_name, bride_name, date, lounge_id]
      properties:
        id:
          type: string
          format: uuid
        groom_name:
          type: string
        bride_name:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
        venue_name:
          type: string
        venue_hall:
          type: string
        cover_image:
          type: string
        lounge_id:
          type: string
          format: uuid

    CreateWeddingRequest:
      type: object
      required: [info, hosts, slug]
      properties:
        info:
          $ref: '#/components/schemas/WeddingInfo'
        hosts:
          $ref: '#/components/schemas/HostSlots'
        slug:
          type: string
          description: "청첩장 공유 링크용 고유 식별자. 클라이언트가 직접 입력. 서버에서 UNIQUE 검증."

    UpdateWeddingRequest:
      type: object
      properties:
        info:
          $ref: '#/components/schemas/WeddingInfo'
        hosts:
          $ref: '#/components/schemas/HostSlots'

    # ── Invitations ──
    Invitation:
      type: object
      required: [id, wedding_id, design_template_id, visited_count, heart_count, slug, created_at]
      properties:
        id:
          type: string
          format: uuid
        wedding_id:
          type: string
          format: uuid
        design_template_id:
          type: string
        custom_message:
          type: string
        visited_count:
          type: integer
        heart_count:
          type: integer
        gallery_photos:
          type: array
          items:
            type: string
        cover_image:
          type: string
        cover_text_config:
          $ref: '#/components/schemas/CoverTextConfig'
        design_config:
          $ref: '#/components/schemas/DesignConfig'
        slug:
          type: string
        created_at:
          type: string
          format: date-time

    InvitationSummary:
      type: object
      required: [id, slug]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        cover_image:
          type: string

    InvitationPublic:
      type: object
      required: [wedding_id, design_template_id, info, visited_count, heart_count, lounge_preview]
      properties:
        wedding_id:
          type: string
          format: uuid
          description: "RSVP 등 wedding 단위 액션에 필요(QA 2026-05-29 G1)."
        design_template_id:
          type: string
        custom_message:
          type: string
        info:
          $ref: '#/components/schemas/WeddingInfo'
        gallery_photos:
          type: array
          items:
            type: string
        cover_image:
          type: string
        cover_text_config:
          $ref: '#/components/schemas/CoverTextConfig'
        design_config:
          $ref: '#/components/schemas/DesignConfig'
        visited_count:
          type: integer
        heart_count:
          type: integer
        lounge_preview:
          $ref: '#/components/schemas/LoungePreview'
          description: "비로그인 상태에서 청첩장과 함께 노출되는 라운지 티저 정보"

    CoverTextConfig:
      type: object
      properties:
        text:
          type: string
          description: "커버 텍스트 문구. 줄바꿈은 \\n"
        font_size:
          type: integer
          description: "폰트 크기 (px)"
        x:
          type: integer
          description: "X 오프셋 (px)"
        y:
          type: integer
          description: "Y 오프셋 (px)"
        rotation:
          type: integer
          description: "회전 각도 (도)"
        animation:
          type: string
          enum: [none, fade-in, typing]
          description: "커버 텍스트 등장 애니메이션"
        color_type:
          type: string
          enum: [solid, gradient]
          description: "커버 텍스트 색상 방식 (미설정 시 테마 기본 그라데이션)"
        solid_color:
          type: string
          description: "단색 hex (color_type=solid)"
        gradient_colors:
          type: array
          items:
            type: string
          description: "그라데이션 시작·끝 색 hex 2개 (color_type=gradient)"

    DesignConfig:
      type: object
      description: "레터링·폰트·색상·섹션 구성"
      properties:
        lettering:
          type: object
