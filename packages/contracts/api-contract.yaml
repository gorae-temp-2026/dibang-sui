# ⚠️ LESSON: 엔드포인트 분류 규칙
# - 분류 기준 = path의 첫 번째 세그먼트(루트 리소스)
# - /users/me/* 패턴은 전부 Users 블록에 배치
# - tags 첫 번째 값 = api-contract.yaml의 주석 블록 = API_ENDPOINT_MAP.md의 섹션 (세 곳 일치)
# - tags 두 번째 값은 보조 분류 (Swagger UI 양쪽 노출용)
openapi: '3.0.3'
info:
  title: 고래 유니버스 API
  version: 0.1.0
  description: 디지털 방명록 v3 API Contract

servers:
  - url: http://localhost:8080
    description: Local development
  - url: https://api.gorae.com
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Users
    description: 사용자 프로필 관리
  - name: Weddings
    description: 결혼식 CRUD
  - name: Invitations
    description: 모바일 청첩장
  - name: Lounges
    description: 웨딩 라운지
  - name: Guestbook
    description: 방명록
  - name: Announcements
    description: 호스트 공지사항
  - name: Feed
    description: 라운지 피드 통합 조회
  - name: FeedHearts
    description: 피드 하트
  - name: FeedComments
    description: 피드 댓글
  - name: GatherPlaces
    description: 모이 모이는 장소
  - name: InteriorItems
    description: 인테리어 아이템
  - name: Mois
    description: 모이 (아바타)
  - name: MoiItems
    description: 모이 아이템
  - name: CashGifts
    description: 축의금
  - name: HostInvites
    description: 부모님 초대
  - name: Iums
    description: 이음 (신뢰네트워크)
  - name: Uploads
    description: 파일 업로드
  - name: memories
    description: 라운지 V2 "온기" 게시물 (text 필수 + 사진 0/1, author_user_id 식별)
  - name: MemoryBook
    description: 웨딩메모리북 — 호스트가 큐레이션한 사진 + 자동선별 메시지 책자
  - name: SharedPhotos
    description: 라운지 공유 사진 (wedding 단위 그룹 조회 등)
  - name: Admin
    description: 운영자 전용 read-only API. /admin/* 는 AdminGuard(admin@gorae.dev allowlist)로 보호.

paths:
  # ──────────────────────────────────────
  # Users
  # ──────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [Users]
      summary: "[owner] 내 프로필 조회"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: updateMe
      tags: [Users]
      summary: "[owner] 내 프로필 수정"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────
  # Consents — 약관 동의 (onboarding + 마케팅 토글)
  # ──────────────────────────────────────
  /consents:
    post:
      operationId: createConsents
      tags: [Consents]
      summary: "[owner] 신규 동의 일괄 INSERT (onboarding 게이트). consent_records append + profiles.terms_version UPDATE"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsentsRequest'
      responses:
        '201':
          description: Created (no body)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /consents/marketing:
    post:
      operationId: updateMarketingConsent
      tags: [Consents]
      summary: "[owner] 마케팅 동의 단독 변경 (settings 토글). consent_records append-only"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMarketingConsentRequest'
      responses:
        '201':
          description: Created (no body)
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/{userId}:
    get:
      operationId: getUser
      tags: [Users]
      summary: "[우선 구현 예정·이름 마스킹 의존] [authenticated] 사용자 공개 프로필 조회"
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /users/me/weddings:
    get:
      operationId: getMyWeddings
      tags: [Users, Weddings]
      summary: "[owner] 내가 Host인 결혼식 목록"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WeddingSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/participated-weddings:
    get:
      operationId: getMyParticipatedWeddings
      tags: [Users, Weddings]
      summary: "[authenticated] 내가 참여한 결혼식 목록"
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ParticipatedWedding'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me/iums:
    get:
      operationId: listMyIums
      deprecated: true
      tags: [Users, Iums]
      summary: "[미구현·추후] [owner] 내 이음 목록"
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IumListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────
  # Weddings
  # ──────────────────────────────────────
  /weddings:
    post:
      operationId: createWedding
      tags: [Weddings]
      summary: "[authenticated] 결혼식 만들기 (Lounge + GatherPlace + Invitation 포함)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWeddingRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wedding'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          $ref: '#/components/responses/Conflict'

  /weddings/{weddingId}:
    get:
      operationId: getWedding
      tags: [Weddings]
      summary: "[public] 결혼식 상세 조회"
      security: []
      parameters:
        - $ref: '#/components/parameters/WeddingId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wedding'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      operationId: updateWedding
      tags: [Weddings]
      summary: "[host] 결혼식 정보 수정"
      parameters:
        - $ref: '#/components/parameters/WeddingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWeddingRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Wedding'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /weddings/{weddingId}/sui-ids:
    patch:
      operationId: updateWeddingSuiIds
      tags: [Weddings]
      summary: "[host] 온체인 발행 Sui 오브젝트 ID 저장 (dual-write, D0-1)"
      parameters:
        - $ref: '#/components/parameters/WeddingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSuiIdsRequest'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────
  # Invitations (청첩장)
  # ──────────────────────────────────────
  /weddings/{weddingId}/invitations:
    post:
      operationId: createInvitation
      tags: [Invitations]
      summary: "[host] 기존 결혼식에 청첩장 추가"
      parameters:
        - $ref: '#/components/parameters/WeddingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInvitationRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'

  /invitations/{slug}:
    get:
      operationId: getInvitation
      tags: [Invitations]
      summary: "[public] 공유 링크로 청첩장 조회"
      security: []
      parameters:
        - $ref: '#/components/parameters/Slug'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvitationPublic'
        '404':
          $ref: '#/components/responses/NotFound'

  /invitations/{slug}/heart:
    post:
      operationId: heartInvitation
      tags: [Invitations]
      summary: "[public] 청첩장 하트"
      security: []
      parameters:
        - $ref: '#/components/parameters/Slug'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HeartResponse'

  /weddings/{weddingId}/invitations/{invitationId}:
    patch:
      operationId: updateInvitation
      tags: [Invitations]
      summary: "[host] 청첩장 수정"
      parameters:
        - $ref: '#/components/parameters/WeddingId'
        - $ref: '#/components/parameters/InvitationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateInvitationRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Invitation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteInvitation
      tags: [Invitations]
      summary: "[host] 청첩장 삭제 (최소 1개 유지)"
      parameters:
        - $ref: '#/components/parameters/WeddingId'
        - $ref: '#/components/parameters/InvitationId'
      responses:
        '204':
          description: No Content
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /weddings/{weddingId}/invitations/{invitationId}/share:
    get:
      operationId: shareInvitation
      tags: [Invitations]
      summary: "[host] 공유 링크 조회"
      parameters:
        - $ref: '#/components/parameters/WeddingId'
        - $ref: '#/components/parameters/InvitationId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShareLinkResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────
  # Lounges (라운지)
  # ──────────────────────────────────────
  /lounges/{loungeId}:
    get:
      operationId: getLounge
      tags: [Lounges]
      summary: "[authenticated] 라운지 정보 조회"
      parameters:
        - $ref: '#/components/parameters/LoungeId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Lounge'
        '404':
          $ref: '#/components/responses/NotFound'

  /lounges/{loungeId}/check-ins/mine:
    get:
      operationId: getMyLoungeCheckIn
      tags: [Lounges]
      summary: "[authenticated] 내 라운지 체크인 기록 조회"
      parameters:
        - $ref: '#/components/parameters/LoungeId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoungeCheckIn'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /lounges/{loungeId}/check-ins:
    post:
      operationId: createLoungeCheckIn
      tags: [Lounges]
      summary: "[authenticated] 라운지 체크인 (LoungeCheckIn 생성)"
      parameters:
        - $ref: '#/components/parameters/LoungeId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLoungeCheckInRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoungeCheckIn'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────
  # Feed (라운지 피드)
  # ──────────────────────────────────────
  /lounges/{loungeId}/feed:
    get:
      operationId: listFeed
      tags: [Feed, Lounges]
      summary: "[authenticated] 라운지 피드 통합 조회"
      parameters:
        - $ref: '#/components/parameters/LoungeId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────
  # Guestbook (방명록)
  # ──────────────────────────────────────
  /lounges/{loungeId}/guestbook:
    get:
      operationId: listGuestbookEntries
      tags: [Guestbook]
      summary: "[public] 방명록 목록"
      security: []
      parameters:
        - $ref: '#/components/parameters/LoungeId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestbookEntryListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createGuestbookEntry
      tags: [Guestbook]
      summary: "[public] 방명록 작성"
      security: []
      parameters:
        - $ref: '#/components/parameters/LoungeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuestbookEntryRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestbookEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /lounges/{loungeId}/guestbook/mine:
    get:
      operationId: getMyGuestbookEntry
      tags: [Guestbook]
      summary: "[authenticated] 내 방명록 조회"
      parameters:
        - $ref: '#/components/parameters/LoungeId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestbookEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /guestbook/{entryId}/message:
    post:
      operationId: createGuestbookMessage
      tags: [Guestbook]
      summary: "[public] 방명록 메세지 생성 (참석 기록에 연결)"
      security: []
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGuestbookMessageRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GuestbookMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /guestbook/messages/{messageId}/view:
    post:
      operationId: recordGuestbookMessageView
      tags: [Guestbook]
      summary: "[authenticated] 피드(방명록 메세지) 조회 기록 — 본인 제외·중복 멱등"
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content (기록 완료, 또는 작성자 본인·중복으로 무시)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /guestbook/{entryId}/claim:
    post:
      operationId: claimGuestbookEntry
      tags: [Guestbook]
      summary: "[authenticated] 비로그인 방명록을 현재 유저에 연결"
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────
  # Announcements (공지)
  # ──────────────────────────────────────
  /lounges/{loungeId}/announcements:
    get:
      operationId: listAnnouncements
      tags: [Announcements]
      summary: "[public] 공지 목록"
      security: []
      parameters:
        - $ref: '#/components/parameters/LoungeId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnnouncementListResponse'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      operationId: createAnnouncement
      tags: [Announcements]
      summary: "[host] 공지 발행"
      parameters:
        - $ref: '#/components/parameters/LoungeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAnnouncementRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcement'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /announcements/{announcementId}:
    patch:
      operationId: updateAnnouncement
      tags: [Announcements]
      summary: "[host] 공지 수정"
      parameters:
        - $ref: '#/components/parameters/AnnouncementId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAnnouncementRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Announcement'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAnnouncement
      tags: [Announcements]
      summary: "[host] 공지 삭제 (soft delete)"
      parameters:
        - $ref: '#/components/parameters/AnnouncementId'
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ──────────────────────────────────────
  # (구 POST /uploads는 2026-06-10 스토리지 일관화로 제거 — createPresignedUpload로 대체)
  # ──────────────────────────────────────
  # RSVP (참석 의사 — 모바일 청첩장)
  # ──────────────────────────────────────
  /weddings/{weddingId}/rsvp:
    post:
      operationId: createRsvp
      tags: [Rsvps]
      summary: "[public] 모바일 청첩장 참석 의사 제출"
      security: []
      parameters:
        - $ref: '#/components/parameters/WeddingId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRsvpRequest'
      responses:
        '201':
          description: Created
