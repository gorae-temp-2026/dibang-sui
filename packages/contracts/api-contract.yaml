      tags: [Admin]
      summary: "[admin] 웨딩 호스트 슬롯 등록 해제 (host_*_id를 NULL로 + 해당 슬롯 accepted 초대 정리)"
      description: "지정 슬롯의 host_*_id를 비우고, 같은 슬롯의 수락(accepted)된 호스트 초대를 같은 트랜잭션에서 삭제한다. 빈 슬롯이거나 웨딩이 없으면 404."
