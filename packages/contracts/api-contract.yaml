          description: "같은 게스트 플로우 세션에서 생성된 GuestbookEntry id. 연결 시 attended(참석) 도출의 기준. 호스트 수기 입력 등 미연결은 생략(불참)."

    HostCreateCashGiftRequest:
      type: object
      required: [guest_name, relation_category, amount, pay_method]
      properties:
        guest_name:
          type: string
          maxLength: 10
        relation_category:
          type: string
          enum: ['가족/친척', '친구/지인', '동문/동창', '직장동료', '스승/제자', '기타모임']
        relation_detail:
          type: string
          maxLength: 40
        amount:
          type: integer
          minimum: 0
        pay_method:
          type: string
          enum: [transfer, kakaopay, toss, cash]

    UpdateCashGiftRequest:
      type: object
      properties:
        guest_name:
          type: string
          maxLength: 10
        relation_category:
          type: string
          enum: ['가족/친척', '친구/지인', '동문/동창', '직장동료', '스승/제자', '기타모임']
        relation_detail:
          type: string
          maxLength: 40
        amount:
          type: integer
          minimum: 0
        pay_method:
          type: string
          enum: [transfer, kakaopay, toss, cash]

    # ── HostInvites ──
    HostInvite:
      type: object
      required: [id, wedding_id, slot, token, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        wedding_id:
          type: string
          format: uuid
        slot:
          type: string
          enum: [groom, bride, groom_father, groom_mother, bride_father, bride_mother]
        token:
          type: string
        status:
          type: string
          enum: [pending, accepted, cancelled]
        invited_user_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        accepted_at:
          type: string
          format: date-time

    HostInvitePublic:
      type: object
      required: [slot, status, wedding_summary]
      properties:
        slot:
          type: string
          enum: [groom, bride, groom_father, groom_mother, bride_father, bride_mother]
        status:
          type: string
          enum: [pending, accepted, cancelled]
        wedding_summary:
          type: object
          required: [groom_name, bride_name, date]
          properties:
            groom_name:
              type: string
            bride_name:
              type: string
            date:
              type: string
              format: date
            venue_name:
              type: string

    CreateHostInviteRequest:
      type: object
      required: [slot]
      properties:
        slot:
          type: string
          enum: [groom, bride, groom_father, groom_mother, bride_father, bride_mother]

    MoveHostSlotRequest:
      type: object
      required: [to_slot]
      properties:
        to_slot:
          type: string
          enum: [groom, bride, groom_father, groom_mother, bride_father, bride_mother]
          description: 이동 대상(비어 있어야 함) 슬롯

    # ── Feed ──
    FeedItemType:
      type: string
      enum: [guestbook_entry, lounge_check_in, host_announcement, guestbook_message, memory]

    FeedItem:
      type: object
      required: [type, id, created_at]
      properties:
        type:
          $ref: '#/components/schemas/FeedItemType'
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        data:
          type: object
          description: "타입별 데이터. guestbook_entry: guest_name/recipient_slot/relation_category/relation_detail. lounge_check_in: visitor_name. host_announcement: message/is_pinned. guestbook_message: message/guest_name/recipient_slot/relation_category/relation_detail/view_count. memory: text/photo_url/author_name."
        heart_count:
          type: integer
          description: "guestbook_entry, host_announcement만. lounge_check_in·guestbook_message에는 없음(피드 글 하트·댓글 비노출 결정)."
        comment_count:
          type: integer
          description: "guestbook_entry, host_announcement만. lounge_check_in·guestbook_message에는 없음(피드 글 하트·댓글 비노출 결정)."
        my_heart:
          type: boolean
          description: "현재 사용자가 하트를 눌렀는지. guestbook_entry, host_announcement만(guestbook_message 비노출)."

    FeedListResponse:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FeedItem'
        next_cursor:
          type: string
        has_more:
          type: boolean

    # ── FeedHearts ──
    ToggleFeedHeartRequest:
      type: object
      required: [target_type, target_id]
      properties:
        target_type:
          type: string
          enum: [guestbook_entry, host_announcement]
        target_id:
          type: string
          format: uuid

    FeedHeartResponse:
      type: object
      required: [hearted, heart_count]
      properties:
        hearted:
          type: boolean
          description: "토글 후 상태. true=하트 추가됨, false=하트 제거됨"
        heart_count:
          type: integer

    # ── FeedComments ──
    FeedComment:
      type: object
      required: [id, user_id, user_name, target_type, target_id, message, created_at]
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        user_name:
          type: string
          description: "댓글 작성자 이름. 마스킹 적용."
        target_type:
          type: string
          enum: [guestbook_entry, host_announcement]
        target_id:
          type: string
          format: uuid
        message:
          type: string
        created_at:
          type: string
          format: date-time

    CreateFeedCommentRequest:
      type: object
      required: [target_type, target_id, message]
      properties:
        target_type:
          type: string
          enum: [guestbook_entry, host_announcement]
        target_id:
          type: string
          format: uuid
        message:
          type: string
          maxLength: 50

    FeedCommentListResponse:
      type: object
      required: [data, has_more]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/FeedComment'
        next_cursor:
          type: string
        has_more:
          type: boolean

    # ── Photo Sharing ──
    CreatePresignedUploadRequest:
      type: object
      required: [category, file_name, mime_type]
      properties:
        category:
          type: string
          enum: [mobile-invitation, memory, share, invitation-draft]
          description: "invitation-draft: Create 흐름(wedding 미존재) 임시 업로드 — v3-tmp/{userId}/ 경로, 저장 확정 시 서버가 wedding 경로로 이동 (_architecture/2026-06-10-invitation-draft-upload.md)"
        wedding_id:
          type: string
          format: uuid
          description: "category=mobile-invitation 시 필수"
        invitation_id:
          type: string
          format: uuid
          description: "category=mobile-invitation 시 필수"
        sub_kind:
          type: string
          enum: [cover, gallery, lettering, canvas]
          description: "category=mobile-invitation 시 필수"
        lounge_id:
          type: string
          format: uuid
          description: "category in (memory, share) 시 필수"
        file_name:
          type: string
        mime_type:
          type: string

    PresignedUploadResponse:
      type: object
      required: [upload_url, object_key]
      properties:
        upload_url:
          type: string
          format: uri
          description: "클라이언트가 PUT으로 직접 업로드할 서명 URL (15분 만료)"
        object_key:
          type: string
          description: "Storage 객체 경로. 클라이언트는 create*Photo 호출 시 storage_path로 사용"
        public_url:
          type: string
          format: uri
          description: "public 버킷 카테고리(mobile-invitation·invitation-draft·memory)일 때 동봉. share는 null (private — signed URL 열람)"

    MobileInvitationPhoto:
      type: object
      required: [id, invitation_id, sub_kind, storage_path, sort_order, created_at]
      properties:
        id: {type: string, format: uuid}
        invitation_id: {type: string, format: uuid}
        sub_kind:
          type: string
          enum: [cover, gallery]
        storage_path: {type: string}
        file_name: {type: string}
        file_size: {type: integer}
        mime_type: {type: string}
        sort_order: {type: integer}
        created_at: {type: string, format: date-time}

    CreateMobileInvitationPhotoRequest:
      type: object
      required: [sub_kind, storage_path]
      properties:
        sub_kind:
          type: string
          enum: [cover, gallery]
        storage_path: {type: string}
        file_name: {type: string}
        file_size: {type: integer}
        mime_type: {type: string}
        sort_order: {type: integer}

    MobileInvitationPhotoListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/MobileInvitationPhoto'

    SharedPhoto:
      type: object
      required: [id, lounge_id, guest_user_id, storage_path, created_at]
      properties:
        id: {type: string, format: uuid}
        lounge_id: {type: string, format: uuid}
        guest_user_id: {type: string, format: uuid}
        storage_path: {type: string}
        file_name: {type: string}
        file_size: {type: integer}
        mime_type: {type: string}
        created_at: {type: string, format: date-time}

    CreateSharedPhotoRequest:
      type: object
      required: [storage_path]
      properties:
        storage_path: {type: string}
        file_name: {type: string}
        file_size: {type: integer}
        mime_type: {type: string}

    SharedPhotoListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/SharedPhoto'

    # ── SharedPhoto Groups (wedding 단위 큐레이션 소스) ───────────────
    SharedPhotoGroupSide:
      type: string
      enum: [groom, bride, other]
      description: "recipient_slot 첫 단어 매핑 (호스트는 wedding 6슬롯 기준)"
    SharedPhotoInGroup:
      type: object
      required: [id, storage_path, created_at]
      properties:
        id: {type: string, format: uuid}
        storage_path: {type: string}
        created_at: {type: string, format: date-time}
    SharedPhotoGroup:
      type: object
      required: [user_id, guest_name, photos, photo_count]
      properties:
        user_id: {type: string, format: uuid}
        guest_name: {type: string, description: "entry.guest_name 우선, 없으면 user.name"}
        side: {$ref: '#/components/schemas/SharedPhotoGroupSide'}
        recipient_slot: {type: string, nullable: true, description: "원본 slot 값 (groom/groom_father 등)"}
        relation_category: {type: string, nullable: true}
        relation_detail: {type: string, nullable: true}
        photos:
          type: array
          items:
            $ref: '#/components/schemas/SharedPhotoInGroup'
        photo_count: {type: integer, minimum: 0}
    SharedPhotoGroupsResponse:
      type: object
      required: [groups]
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/SharedPhotoGroup'

    # ── MemoryBook ─────────────────────────────────────────────────────
    MemoryBookStatus:
      type: string
      enum: [ready_uncurated, ready]
      description: ready_uncurated = 큐레이션 0건, ready = 1건 이상 큐레이션 완료
    MemoryBookCouple:
      type: object
      required: [groom_name, bride_name, wedding_date, venue_name]
      properties:
        groom_name: {type: string}
        bride_name: {type: string}
        wedding_date: {type: string, format: date}
        time: {type: string, nullable: true}
        venue_name: {type: string}
        venue_address: {type: string, nullable: true}
        venue_hall: {type: string, nullable: true}
        cover_photo_url: {type: string, nullable: true, description: "청첩장 cover_image. PrologueSection 표지 + DisplaySection fallback"}
    MemoryBookPhoto:
      type: object
      required: [id, storage_path]
      properties:
        id: {type: string, format: uuid}
        storage_path: {type: string}
        guest_user_id: {type: string, format: uuid, nullable: true}
    MemoryBookMessage:
      type: object
      required: [id, message, is_heart, created_at]
      properties:
        id: {type: string, format: uuid}
        guest_name: {type: string, nullable: true}
        relation_label: {type: string, nullable: true, description: "recipient_slot + relation_category/detail 결합 라벨"}
        side: {type: string, enum: [groom, bride, other], description: "recipient_slot 첫 단어 매핑"}
        message: {type: string}
        is_heart: {type: boolean, description: "message == '__HEART__' sentinel 매핑"}
        created_at: {type: string, format: date-time}
    MemoryBookStats:
      type: object
      required: [total_guests, total_messages, photos_uploaded]
      properties:
        total_guests: {type: integer, description: "전체 방명록 메시지 수"}
        total_messages: {type: integer, description: "메시지 + 축의금 합산 (마음의 합산)"}
        photos_uploaded: {type: integer, description: "라운지 공유 사진 전체 개수"}
    MemoryBookData:
      type: object
      required: [couple, curated_photos, display_photos, mec_messages, stats]
      properties:
        couple:
          $ref: '#/components/schemas/MemoryBookCouple'
        curated_photos:
          type: array
          items:
            $ref: '#/components/schemas/MemoryBookPhoto'
        display_photos:
          type: array
          description: "메모리북 viewer DisplaySection 배경 슬라이드쇼용. v3_mobile_invitations.gallery_photos jsonb 배열 (public URL 그대로)"
          items:
            type: string
        mec_messages:
          type: array
          description: "텍스트 30개 + 하트 6개 자동선별 (텍스트 시간순 → 하트 별도 뒤)"
          items:
            $ref: '#/components/schemas/MemoryBookMessage'
        stats:
          $ref: '#/components/schemas/MemoryBookStats'
    MemoryBookResponse:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/MemoryBookStatus'
        data:
          $ref: '#/components/schemas/MemoryBookData'
          nullable: true
    ReplaceMemoryBookPhotosRequest:
      type: object
      required: [photo_ids]
      properties:
        photo_ids:
          type: array
          maxItems: 30
          uniqueItems: true
          items:
            type: string
            format: uuid
    ReplaceMemoryBookPhotosResponse:
      type: object
      required: [ok, count]
      properties:
        ok: {type: boolean}
        count: {type: integer, minimum: 0, maximum: 30}
    InvalidMemoryBookPhotosError:
      type: object
      required: [error]
      properties:
        error: {type: string}
        invalid_ids:
          type: array
          items:
            type: string
            format: uuid
          description: "wedding의 라운지 shared 사진이 아니거나 존재하지 않는 photo_id 목록"

    # ── Admin (운영자 read-only) ──
    AdminPagination:
      type: object
      required: [page, limit, total]
      properties:
        page: {type: integer, minimum: 1}
        limit: {type: integer, minimum: 1}
        total: {type: integer, minimum: 0}

    AdminUser:
      type: object
      required: [id, name, email, created_at, own_weddings_count, guest_weddings_count]
      properties:
        id: {type: string, format: uuid}
        name: {type: string}
        email: {type: string}
        phone: {type: string, nullable: true}
        profile_image_url: {type: string, nullable: true}
        created_at: {type: string, format: date-time}
        provider: {type: string, nullable: true, description: "auth.users 식별 공급자 (google/email/kakao)"}
        last_sign_in_at: {type: string, format: date-time, nullable: true}
        own_weddings_count: {type: integer, minimum: 0, description: "본인 웨딩 — 호스트 슬롯 6칸 중 한 곳이라도 이 유저인 wedding 수 (status != deleted)"}
        guest_weddings_count: {type: integer, minimum: 0, description: "참여 웨딩 — 게스트 활동(방명록/축의금/사진/메모리/메모리북/라운지 입장)이 있는 wedding의 distinct 수"}

    AdminUserList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/AdminUser'}
        meta: {$ref: '#/components/schemas/AdminPagination'}

    AdminHostParticipation:
      type: object
      required: [wedding_id, wedding_label, slot, wedding_status]
      properties:
        wedding_id: {type: string, format: uuid}
        wedding_label: {type: string, description: "groom_name ♥ bride_name"}
        slot:
          type: string
          enum: [groom, bride, groom_father, groom_mother, bride_father, bride_mother]
        wedding_date: {type: string, format: date, nullable: true}
        wedding_status: {type: string}

    AdminActivityCounts:
      type: object
      required: [guestbook, cash_gifts, messages, shared_photos, memories, memory_book, lounge]
      properties:
        guestbook: {type: integer, minimum: 0}
        cash_gifts: {type: integer, minimum: 0}
        messages: {type: integer, minimum: 0}
        shared_photos: {type: integer, minimum: 0}
        memories: {type: integer, minimum: 0}
        memory_book: {type: integer, minimum: 0}
        lounge: {type: integer, minimum: 0}

    AdminUserDetail:
      allOf:
        - $ref: '#/components/schemas/AdminUser'
        - type: object
          required: [host_participations, activity_counts]
          properties:
            host_participations:
              type: array
              items: {$ref: '#/components/schemas/AdminHostParticipation'}
            activity_counts: {$ref: '#/components/schemas/AdminActivityCounts'}
            is_placeholder: {type: boolean, description: "G-15 운영자 placeholder user 여부"}

    AdminActivity:
      type: object
      required: [id, type, wedding_id, wedding_label, role, summary, created_at]
      properties:
        id: {type: string, format: uuid}
        type:
          type: string
          enum: [guestbook, cash_gifts, messages, shared_photos, memories, memory_book, lounge]
        wedding_id: {type: string, format: uuid}
        wedding_label: {type: string}
        role: {type: string, enum: [host, guest]}
        summary: {type: string, description: "사용자가 보기 좋은 요약 (예: 메시지 본문 30자, 사진 caption, 금액 등)"}
        amount: {type: integer, nullable: true, description: "cash_gifts type에서만 채워짐"}
        created_at: {type: string, format: date-time}

    AdminActivityList:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items: {$ref: '#/components/schemas/AdminActivity'}
        meta: {$ref: '#/components/schemas/AdminPagination'}

    AdminWeddingSummary:
      type: object
      required: [id, groom_name, bride_name, status, created_at]
      properties:
        id: {type: string, format: uuid}
        groom_name: {type: string}
        bride_name: {type: string}
        date: {type: string, format: date, nullable: true}
        status: {type: string}
        created_at: {type: string, format: date-time}

    AdminDashboardStats:
      type: object
      required:
        [today_weddings, today_users, today_cash_gifts_count,
         today_cash_gifts_amount, total_users, total_weddings]
      properties:
        today_weddings: {type: integer, minimum: 0}
        today_users: {type: integer, minimum: 0}
        today_cash_gifts_count: {type: integer, minimum: 0}
        today_cash_gifts_amount: {type: integer, minimum: 0, description: "원 단위 합산"}
        total_users: {type: integer, minimum: 0}
        total_weddings: {type: integer, minimum: 0, description: "status != deleted 만"}

    AdminDashboardRecent:
      type: object
      required: [recent_users, recent_weddings]
      properties:
        recent_users:
          type: array
          maxItems: 5
          items: {$ref: '#/components/schemas/AdminUser'}
        recent_weddings:
          type: array
          maxItems: 5
          items: {$ref: '#/components/schemas/AdminWeddingSummary'}

    AdminHealthCheck:
      type: object
      required: [key, value, description]
      properties:
        key: {type: string, enum: [placeholder_host_weddings, name_fallback_users, deleted_weddings, duplicate_couples, null_host_slot_ratio]}
        value: {type: number, description: "정수 카운트 또는 0-1 비율"}
        severity: {type: string, enum: [ok, warn, error]}
        description: {type: string}

    AdminDashboardHealth:
      type: object
      required: [checks]
      properties:
        checks:
          type: array
          items: {$ref: '#/components/schemas/AdminHealthCheck'}
